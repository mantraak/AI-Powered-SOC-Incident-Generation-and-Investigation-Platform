include "/etc/thehive/secret.conf"

# TheHive 5.4+ uses Apache Pekko even for a single application node. Without a
# seed address it enters cluster-bootstrap mode and exits because no discovery
# mechanism is configured.
pekko {
  cluster.enable = on
  actor.provider = cluster
  remote.artery.canonical {
    hostname = "thehive"
    port = 7355
  }
  cluster.seed-nodes = ["pekko://application@thehive:7355"]
  cluster.min-nr-of-members = 1
}

db.janusgraph {
  storage {
    backend = cql
    hostname = ["thehive-cassandra"]
    username = cassandra
    password = cassandra
    cql {
      cluster-name = thp
      keyspace = thehive
    }
  }
  index.search {
    backend = elasticsearch
    hostname = ["thehive-elasticsearch"]
    index-name = thehive
    elasticsearch {
      http.auth.type = basic
      http.auth.basic.username = elastic
      http.auth.basic.password = ${?THEHIVE_ES_PASSWORD}
    }
  }
}

storage.provider = localfs
storage.localfs.location = /opt/thp/thehive/files
application.baseUrl = "http://localhost:9000"
play.http.context = "/"
play.http.secret.key = ${?THEHIVE_SECRET}
