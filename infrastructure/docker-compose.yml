version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aisoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mitre-sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: ["python", "-m", "app.services.mitre_sync"]
    environment:
      MITRE_ATTACK_VERSION: "19.1"
      MITRE_STIX_URL: https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/enterprise-attack/enterprise-attack-19.1.json
      MITRE_CATALOG_PATH: /app/data/mitre/catalog.json
      MITRE_FORCE_SYNC: ${MITRE_FORCE_SYNC:-false}
    volumes:
      - mitre_data:/app/data/mitre

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aisoc
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-ChangeThisInProduction!SecretKey42}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      AI_API_ENDPOINT: ${AI_API_ENDPOINT:-https://integrate.api.nvidia.com/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-meta/llama-3.3-70b-instruct}
      WAZUH_API_URL: https://wazuh.manager:55000
      MISP_URL: https://misp
      THEHIVE_URL: http://thehive:9000
      GRAFANA_URL: http://grafana:3000
      PROMETHEUS_URL: http://prometheus:9090
      WAZUH_PUBLIC_URL: https://localhost:8443
      MISP_PUBLIC_URL: https://localhost:10443
      THEHIVE_PUBLIC_URL: http://localhost:9000/thehive
      GRAFANA_PUBLIC_URL: http://localhost:3001
      PROMETHEUS_PUBLIC_URL: http://localhost:9090
      MITRE_ATTACK_VERSION: "19.1"
      MITRE_CATALOG_PATH: /app/data/mitre/catalog.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mitre-sync:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - mitre_data:/app/data/mitre:ro
    working_dir: /app
    networks:
      - default
      - soc-tools
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  mitre_data:

networks:
  soc-tools:
    external: true
    name: ai-soc-tools
