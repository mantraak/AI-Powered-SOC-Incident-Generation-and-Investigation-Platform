name: romulus

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aisoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mitre-sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: ["python", "-m", "app.services.mitre_sync"]
    environment:
      MITRE_ATTACK_VERSION: "19.1"
      MITRE_STIX_URL: https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/enterprise-attack/enterprise-attack-19.1.json
      MITRE_CATALOG_PATH: /app/data/mitre/catalog.json
      MITRE_FORCE_SYNC: ${MITRE_FORCE_SYNC:-false}
    volumes:
      - mitre_data:/app/data/mitre

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aisoc
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-ChangeThisInProduction!SecretKey42}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      AI_API_ENDPOINT: ${AI_API_ENDPOINT:-https://integrate.api.nvidia.com/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-meta/llama-3.3-70b-instruct}
      WAZUH_INDEXER_URL: https://wazuh.indexer:9200
      WAZUH_DASHBOARD_URL: https://wazuh.dashboard:5601
      WAZUH_INDEXER_USERNAME: admin
      WAZUH_INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-SecretPassword}
      WAZUH_PUBLIC_URL: ${WAZUH_PUBLIC_URL:-https://localhost:48173/wazuh}
      MISP_PUBLIC_URL: ${MISP_PUBLIC_URL:-https://localhost:48173/misp}
      MISP_TRAINING_USERNAME: ${MISP_ADMIN_EMAIL:-admin@admin.test}
      MISP_TRAINING_PASSWORD: ${MISP_ADMIN_PASSWORD:-ChangeMe-MISP-2026!}
      THEHIVE_PUBLIC_URL: ${THEHIVE_PUBLIC_URL:-https://localhost:48173/thehive}
      THEHIVE_TRAINING_USERNAME: ${THEHIVE_ADMIN_EMAIL:-admin@thehive.local}
      THEHIVE_TRAINING_PASSWORD: ${THEHIVE_ADMIN_PASSWORD:-secret}
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:-https://localhost:48173/grafana}
      PROMETHEUS_PUBLIC_URL: ${PROMETHEUS_PUBLIC_URL:-https://localhost:48173/prometheus}
      GRAFANA_TRAINING_USERNAME: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_TRAINING_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ChangeMe-Grafana-2026!}
      MITRE_ATTACK_VERSION: "19.1"
      MITRE_CATALOG_PATH: /app/data/mitre/catalog.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mitre-sync:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - mitre_data:/app/data/mitre:ro
    working_dir: /app
    networks:
      - default
      - soc-tools
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${ROMULUS_PORT:-48173}:443"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/wazuh/certs/wazuh.dashboard.pem:/etc/nginx/certs/gateway.pem:ro
      - ./infrastructure/wazuh/certs/wazuh.dashboard-key.pem:/etc/nginx/certs/gateway-key.pem:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - default
      - soc-tools

volumes:
  postgres_data:
  mitre_data:

networks:
  soc-tools:
    external: true
    name: ai-soc-tools
