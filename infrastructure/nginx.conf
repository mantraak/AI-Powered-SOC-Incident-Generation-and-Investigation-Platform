server {
    listen 80;
    server_name _;

    # Re-resolve service names after Docker recreates a container with a new IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:3000;

    # API → FastAPI backend
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Swagger docs (optional convenience)
    location /docs {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    # Frontend → React (served by nginx in the frontend container via port 3000,
    # or direct static files – see frontend Dockerfile)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
