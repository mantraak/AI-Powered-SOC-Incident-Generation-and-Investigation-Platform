# Only send "Connection: upgrade" for actual WebSocket upgrade requests
# (the collaborative-lab chat/presence/tasks/notes/activity channel at
# /api/v1/lab-groups/ws/{id}); normal REST calls keep standard keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/nginx/certs/gateway.pem;
    ssl_certificate_key /etc/nginx/certs/gateway-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Re-resolve service names after Docker recreates a container with a new IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:80;
    set $wazuh_upstream https://wazuh.dashboard:5601;
    set $misp_upstream https://misp:443;
    set $thehive_upstream http://thehive:9000;
    set $grafana_upstream http://grafana:3000;
    set $prometheus_upstream http://prometheus:9090;

    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 48173;

    # Some upstream applications generate absolute redirects from their
    # internal/default port. Keep every redirect on the single public gateway.
    proxy_redirect ~^https?://localhost(?::[0-9]+)?(/.*)$ https://$http_host$1;

    location = /wazuh { return 301 /wazuh/; }
    location /wazuh/ {
        proxy_pass $wazuh_upstream;
        proxy_ssl_verify off;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location = /misp { return 301 /misp/; }
    location /misp/ {
        # MISP is mounted at / externally but advertises BASE_URL=/misp.
        # Remove the gateway prefix before forwarding to its Apache server.
        rewrite ^/misp/(.*)$ /$1 break;
        proxy_pass $misp_upstream;
        proxy_ssl_verify off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Prefix /misp;
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    location = /thehive { return 301 /thehive/; }
    location /thehive/ {
        proxy_pass $thehive_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    location = /grafana { return 301 /grafana/; }
    location /grafana/ {
        proxy_pass $grafana_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /prometheus { return 301 /prometheus/; }
    location /prometheus/ {
        proxy_pass $prometheus_upstream;
        proxy_set_header Host $http_host;
    }

    # API -> FastAPI backend (includes the collaborative-lab WebSocket at
    # /api/v1/lab-groups/ws/{id} - needs the Upgrade/Connection headers too,
    # not just REST).
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /health {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    # Swagger docs (optional convenience)
    location /docs {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    # Frontend → React (served by nginx in the frontend container via port 80,
    # or direct static files – see frontend Dockerfile)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
